<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>🏖️ Gepetto</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#eaf3ff;
  --panel:#f8fbff;
  --panel-strong:#ffffff;
  --border:#cfe0f5;
  --text:#10233f;
  --muted:#5f7592;
  --accent:#2f6fb3;
  --accent-soft:#d9eaff;
  --user:#d9ebff;
  --bot:#ffffff;
  --shadow:0 10px 30px rgba(33, 79, 140, 0.08);
}

*{ box-sizing:border-box; }

html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background:linear-gradient(180deg, #edf5ff 0%, #e4f0ff 100%);
  color:var(--text);
  -webkit-text-size-adjust:100%;
  overflow:hidden;
  touch-action:manipulation;
}

body{
  display:flex;
  justify-content:center;
  overscroll-behavior:none;
}

.app{
  position:relative;
  width:100%;
  max-width:680px;
  margin:0 auto;
  height:100svh;
  min-height:100svh;
  display:flex;
  flex-direction:column;
  background:linear-gradient(180deg, #edf5ff 0%, #e4f0ff 100%);
  overflow:hidden;
}

/* PAPEL DE PAREDE */
.app::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url('/static/gepetto-bg.jpg');
  background-repeat:no-repeat;
  background-position:center 72%;
  background-size:72%;
  opacity:.11;
  pointer-events:none;
  z-index:0;
}

/* TOPO */
.header{
  position:sticky;
  top:0;
  z-index:20;
  padding:
    calc(12px + env(safe-area-inset-top))
    14px
    10px;
  background:rgba(248, 251, 255, 0.90);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  box-shadow:0 8px 18px rgba(33, 79, 140, 0.05);
}

.header-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
}

.brand{
  min-width:0;
}

.brand-title{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

.brand-sticker{
  width:44px;
  height:44px;
  object-fit:contain;
  flex:0 0 auto;
  filter:drop-shadow(0 3px 8px rgba(33, 79, 140, 0.10));
}

.brand h1{
  margin:0;
  font-family:"Pacifico", cursive;
  font-size:34px;
  line-height:1;
  letter-spacing:0.2px;
  font-weight:400;
  color:var(--accent);
  text-shadow:0 2px 0 rgba(255,255,255,0.65);
}

.beta-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:3px 8px;
  border-radius:999px;
  background:rgba(47, 111, 179, 0.10);
  border:1px solid rgba(47, 111, 179, 0.18);
  color:var(--accent);
  font-size:11px;
  font-weight:800;
  line-height:1;
  letter-spacing:.2px;
}

.brand p{
  margin:6px 0 0;
  font-size:13px;
  line-height:1.35;
  color:var(--muted);
  font-weight:600;
}

.host-note{
  margin-top:4px;
  font-size:11px;
  line-height:1.35;
  color:var(--muted);
  opacity:.92;
  text-align:right;
  white-space:normal;
  max-width:180px;
  font-style:italic;
}

/* BOTÕES */
.quick{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:8px;
  margin-top:12px;
}

.quick button{
  min-height:36px;
  padding:7px 10px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.92);
  color:var(--text);
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  box-shadow:none;
  transition:transform .12s ease, background .12s ease, border-color .12s ease;
}

.quick button:active{
  transform:scale(.98);
}

.quick button:hover{
  background:#f2f8ff;
  border-color:#bdd5f0;
}

/* CHAT */
#chat{
  position:relative;
  z-index:1;
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  scroll-behavior:smooth;
  padding:14px 14px 120px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.row{
  display:flex;
  width:100%;
  align-items:flex-end;
}

.row.bot{
  justify-content:flex-start;
}

.row.user{
  justify-content:flex-end;
}

.bot-wrap{
  display:flex;
  align-items:flex-end;
  gap:8px;
  max-width:92%;
}

.avatar{
  flex:0 0 34px;
  width:34px;
  height:34px;
  border-radius:50%;
  object-fit:cover;
  border:1px solid #c9ddf7;
  background:#fff;
  box-shadow:0 4px 12px rgba(33, 79, 140, 0.08);
}

.msg{
  max-width:86%;
  padding:12px 14px;
  border-radius:18px;
  font-size:14px;
  line-height:1.5;
  box-shadow:var(--shadow);
  word-wrap:break-word;
  white-space:pre-wrap;
}

.msg.bot{
  max-width:82%;
  background:rgba(255,255,255,0.96);
  border:1px solid var(--border);
  color:var(--text);
  border-top-left-radius:7px;
}

.msg.user{
  max-width:90%;
  background:var(--user);
  border:1px solid #bdd6f7;
  color:var(--text);
  border-top-right-radius:7px;
}

/* INPUT */
#inputWrap{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:0;
  z-index:25;
  width:100%;
  max-width:680px;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  background:rgba(248, 251, 255, 0.95);
  backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
}

#inputArea{
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(255,255,255,0.96);
  border:1px solid var(--border);
  border-radius:18px;
  padding:8px;
  box-shadow:var(--shadow);
}

#msg{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
  color:var(--text);
  font-size:16px;
  line-height:1.2;
  padding:10px 8px;
  min-width:0;
  transform:translateZ(0);
}

#msg::placeholder{
  color:var(--muted);
}

button.send{
  flex:0 0 auto;
  border:none;
  background:var(--accent);
  color:#fff;
  cursor:pointer;
  border-radius:14px;
  min-height:42px;
  padding:0 16px;
  font-size:14px;
  font-weight:800;
  transition:transform .12s ease, opacity .12s ease;
}

button.send:active{
  transform:scale(.98);
}

button.send:hover{
  opacity:.94;
}

/* RESPONSIVO */
@media (max-width: 560px){
  .header{
    padding:
      calc(10px + env(safe-area-inset-top))
      12px
      10px;
  }

  .brand h1{
    font-size:31px;
  }

  .brand p{
    font-size:12px;
  }

  .host-note{
    font-size:10px;
    max-width:140px;
  }

  .brand-sticker{
    width:38px;
    height:38px;
  }

  .beta-badge{
    font-size:10px;
    padding:3px 7px;
  }

  .quick{
    grid-template-columns:1fr 1fr;
  }

  .quick button{
    font-size:13px;
    min-height:35px;
  }

  .msg{
    font-size:14px;
  }

  .msg.bot{
    max-width:88%;
  }

  .msg.user{
    max-width:92%;
  }

  .bot-wrap{
    max-width:94%;
  }

  .app::before{
    background-size:88%;
    background-position:center 76%;
    opacity:.10;
  }
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-title">
          <img class="brand-sticker" src="/static/gepetto-sticker.png" alt="Gepetto" onerror="this.style.display='none'">
          <h1>Gepetto</h1>
          <span class="beta-badge">v1.01 beta</span>
        </div>
        <p>Concierge do Apto 14B à sua disposição!</p>
      </div>

      <div class="host-note">Hospedagem administrada por Bruno Bressanin</div>
    </div>

    <div class="quick">
      <button onclick="quick('wifi')">📶 Wi-Fi</button>
      <button onclick="quick('praia')">🏖️ Praia</button>
      <button onclick="quick('restaurante')">🍽️ Comer</button>
      <button onclick="quick('mercado')">🛒 Mercado</button>
    </div>
  </div>

  <div id="chat"></div>

  <div id="inputWrap">
    <div id="inputArea">
      <input id="msg" placeholder="Fale com o Gepetto..." onkeydown="enter(event)" autocomplete="off">
      <button class="send" onclick="send()">Enviar</button>
    </div>
  </div>

</div>

<script>
function format(text){
  return (text || "")
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\n/g, "<br>");
}

function escapeHtml(text){
  const div = document.createElement("div");
  div.textContent = text || "";
  return div.innerHTML;
}

function scrollToBottom(force = false){
  const chat = document.getElementById("chat");
  requestAnimationFrame(() => {
    chat.scrollTo({
      top: chat.scrollHeight,
      behavior: force ? "auto" : "smooth"
    });
  });
}

function add(role, text){
  const chat = document.getElementById("chat");
  let html = "";

  if(role === "bot"){
    html = `
      <div class="row bot">
        <div class="bot-wrap">
          <img class="avatar" src="/static/gepetto-avatar.jpg" alt="Gepetto" onerror="this.style.display='none'">
          <div class="msg bot">${format(text)}</div>
        </div>
      </div>
    `;
  } else {
    html = `
      <div class="row user">
        <div class="msg user">${escapeHtml(text)}</div>
      </div>
    `;
  }

  chat.insertAdjacentHTML("beforeend", html);
  scrollToBottom();
}

function quick(q){
  document.getElementById("msg").value = q;
  send();
}

function enter(e){
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
}

async function send(){
  const input = document.getElementById("msg");
  const msg = input.value.trim();
  if(!msg) return;

  add("user", msg);
  input.value = "";

  try{
    const res = await fetch("/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({message: msg})
    });

    const text = await res.text();
    const data = JSON.parse(text);

    add("bot", data.reply || "⚠️ Erro ao responder");
  }catch(e){
    console.error("Erro no send:", e);
    add("bot", "⚠️ Erro ao conectar com o servidor");
  }
}

async function start(){
  try{
    const res = await fetch("/welcome");
    const data = await res.json();

    const partes = (data.message || "").split("\n\n").filter(Boolean);
    partes.forEach(p => add("bot", p));
    scrollToBottom(true);
  }catch(e){
    console.error("Erro no start:", e);
    add("bot", "Olá 😊 Eu sou o Gepetto.");
    scrollToBottom(true);
  }
}

window.addEventListener("load", () => {
  setTimeout(() => {
    scrollToBottom(true);
  }, 80);
});

start();
</script>

</body>
</html>
