<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gepetto</title>

<style>
:root{
  --bg:#f4f4f5;
  --card:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
  --user:#dbeafe;
  --bot:#ececec;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system, Arial;
  background:#f4f4f5;
  display:flex;
  justify-content:center;
}

.app{
  width:100%;
  max-width:760px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.header{
  position:sticky;
  top:0;
  background:white;
  border-bottom:1px solid var(--border);
  padding:16px;
  z-index:10;
}

.header h1{
  margin:0;
  font-size:26px;
}

.header p{
  margin:4px 0 0;
  font-size:14px;
  color:var(--muted);
}

.quick-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.quick-btn{
  border:1px solid var(--border);
  background:white;
  border-radius:14px;
  padding:12px;
  font-weight:600;
  font-size:14px;
}

.messages{
  flex:1;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
  overflow-y:auto;
  position:relative;
}

/* MARCA D'ÁGUA */
.messages::before{
  content:"Bem-vindo à Enseada 🏖️";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:28px;
  font-weight:800;
  color:rgba(0,0,0,0.05);
  pointer-events:none;
}

.row{
  display:flex;
}

.row.user{
  justify-content:flex-end;
}

.bubble{
  max-width:80%;
  padding:12px 14px;
  border-radius:16px;
  line-height:1.4;
  font-size:15px;
}

.row.user .bubble{
  background:var(--user);
}

.row.bot .bubble{
  background:var(--bot);
}

.input-area{
  position:sticky;
  bottom:0;
  background:white;
  border-top:1px solid var(--border);
  display:flex;
}

input{
  flex:1;
  border:none;
  padding:14px;
  font-size:15px;
}

button{
  background:black;
  color:white;
  border:none;
  padding:14px 18px;
}

</style>
</head>

<body>

<div class="app">

  <div class="header">
    <h1>Gepetto 🏖️</h1>
    <p>Seu assistente pessoal durante a estadia</p>

    <div class="quick-actions">
      <button class="quick-btn" onclick="quickAsk('wifi')">📶 Wi-Fi</button>
      <button class="quick-btn" onclick="quickAsk('praia')">🏖️ Praia</button>
      <button class="quick-btn" onclick="quickAsk('restaurante')">🍽️ Restaurantes</button>
      <button class="quick-btn" onclick="quickAsk('mercado')">🛒 Mercado</button>
    </div>
  </div>

  <div id="chat" class="messages"></div>

  <div class="input-area">
    <input id="msg" placeholder="Fale com o Gepetto..." onkeydown="enter(event)">
    <button onclick="send()">Enviar</button>
  </div>

</div>

<script>

function addMessage(role, text){
  let chat = document.getElementById("chat");

  let row = document.createElement("div");
  row.className = "row " + role;

  let bubble = document.createElement("div");
  bubble.className = "bubble";

  // 🔥 NEGRITO ATIVO AQUI
  bubble.innerHTML = text;

  row.appendChild(bubble);
  chat.appendChild(row);

  chat.scrollTop = chat.scrollHeight;
}

function quickAsk(text){
  document.getElementById("msg").value = text;
  send();
}

function enter(e){
  if(e.key === "Enter"){
    send();
  }
}

async function send(){
  let msg = document.getElementById("msg").value;
  if(!msg) return;

  addMessage("user", msg);

  let res = await fetch("/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({message: msg})
  });

  let data = await res.json();

  addMessage("bot", data.reply);

  document.getElementById("msg").value="";
}

/* 🔥 BOAS-VINDAS DINÂMICA */
async function carregarBoasVindas(){
  try{
    let res = await fetch("/welcome");
    let data = await res.json();
    addMessage("bot", data.message);
  }catch{
    addMessage("bot","Olá 😊 Eu sou o Gepetto!");
  }
}

carregarBoasVindas();

</script>

</body>
</html>
