<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gepetto</title>

<style>
body {
  margin:0;
  font-family: -apple-system, Arial;
  background:#f2f2f2;
}

.header {
  background:white;
  padding:16px;
  border-bottom:1px solid #ddd;
  font-weight:600;
}

#chat {
  padding:10px;
  height:75vh;
  overflow-y:auto;
}

.msg {
  margin:8px 0;
  padding:12px;
  border-radius:12px;
  max-width:75%;
  line-height:1.4;
}

.user {
  background:#d6eaff;
  margin-left:auto;
}

.bot {
  background:#eaeaea;
}

#inputArea {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
  border-top:1px solid #ddd;
}

input {
  flex:1;
  padding:15px;
  border:none;
  font-size:16px;
}

button {
  padding:15px;
  background:black;
  color:white;
  border:none;
}

.quick {
  padding:10px;
}

.quick button {
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:20px;
  background:#fff;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">
Gepetto • Seu concierge 🏖️
</div>

<div class="quick">
<button onclick="quick('wifi')">📶 Wi-Fi</button>
<button onclick="quick('praia')">🏖️ Praia</button>
<button onclick="quick('restaurante')">🍽️ Restaurantes</button>
<button onclick="quick('mercado')">🛒 Mercado</button>
</div>

<div id="chat"></div>

<div id="inputArea">
<input id="msg" placeholder="Fale com o Gepetto..." onkeydown="enter(event)">
<button onclick="send()">Enviar</button>
</div>

<script>

function add(role, text){
 let chat = document.getElementById("chat");
 chat.innerHTML += `<div class="msg ${role}">${text}</div>`;
 chat.scrollTop = chat.scrollHeight;
}

function quick(q){
 document.getElementById("msg").value = q;
 send();
}

function enter(e){
 if(e.key==="Enter"){
  send();
 }
}

async function send(){
 let msg = document.getElementById("msg").value;
 if(!msg) return;

 add("user", msg);

 let res = await fetch("/chat", {
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({message: msg})
 });

 let data = await res.json();

 add("bot", data.reply);

 document.getElementById("msg").value="";
}

add("bot", "Olá 😊 Eu sou o Gepetto, seu concierge pessoal durante sua estadia! Posso te ajudar com praia, restaurantes ou qualquer dúvida.");

</script>

</body>
</html>
