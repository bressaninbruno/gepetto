<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gepetto</title>

<style>
body{
  margin:0;
  font-family:-apple-system, Arial;
  background:#f4f4f5;
  display:flex;
  justify-content:center;
}

.app{
  width:100%;
  max-width:600px;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.header{
  padding:16px;
  background:white;
  border-bottom:1px solid #ddd;
}

/* 🔥 TOPO COM GEPETTO */
.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.brand img{
  width:44px;
  height:44px;
  border-radius:12px;
}

.brand h1{
  margin:0;
  font-size:20px;
}

.brand p{
  margin:2px 0 0;
  font-size:13px;
  color:#666;
}

/* BOTÕES */
.quick{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:12px;
}

.quick button{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  height:48px;
  border-radius:12px;
  border:1px solid #ddd;
  background:white;
  font-weight:600;
  font-size:14px;
}

/* CHAT */
#chat{
  flex:1;
  overflow-y:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MENSAGENS */
.row{
  display:flex;
}

.row.bot{
  align-items:flex-end;
  gap:8px;
}

.msg{
  max-width:75%;
  padding:12px;
  border-radius:14px;
  line-height:1.4;
  font-size:14px;
}

.user{
  align-self:flex-end;
  background:#dbeafe;
}

.bot{
  background:#e5e5e5;
}

/* AVATAR */
.avatar{
  width:34px;
  height:34px;
  border-radius:50%;
  overflow:hidden;
  background:white;
  flex-shrink:0;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* INPUT */
#inputArea{
  display:flex;
  border-top:1px solid #ddd;
  background:white;
}

input{
  flex:1;
  padding:14px;
  border:none;
  font-size:14px;
}

button.send{
  padding:14px;
  background:black;
  color:white;
  border:none;
}

/* 🔥 RODAPÉ */
.footer{
  text-align:center;
  font-size:11px;
  color:#999;
  padding:6px;
  background:white;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <div class="brand">
    <img src="gepetto.png?v=2">
    <div>
      <h1>Gepetto</h1>
      <p>Seu concierge • Apto 14B</p>
    </div>
  </div>

  <div class="quick">
    <button onclick="quick('wifi')">📶 Wi-Fi</button>
    <button onclick="quick('praia')">🏖️ Praia</button>
    <button onclick="quick('restaurante')">🍽️ Restaurantes</button>
    <button onclick="quick('mercado')">🛒 Mercado</button>
  </div>
</div>

<div id="chat"></div>

<div id="inputArea">
  <input id="msg" placeholder="Fale com o Gepetto..." onkeydown="enter(event)">
  <button class="send" onclick="send()">Enviar</button>
</div>

<div class="footer">
  Hospedagem administrada por Bruno
</div>

</div>

<script>

function add(role, text){
  let chat = document.getElementById("chat");
  let msg;

  if(role === "bot"){
    msg = `
      <div class="row bot">
        <div class="avatar">
          <img src="/static/gepetto.png">
        </div>
        <div class="msg bot">${text}</div>
      </div>
    `;
  } else {
    msg = `<div class="msg user">${text}</div>`;
  }

  chat.innerHTML += msg;
  chat.scrollTop = chat.scrollHeight;
}

function quick(q){
  document.getElementById("msg").value = q;
  send();
}

function enter(e){
  if(e.key==="Enter"){
    send();
  }
}

async function send(){
  let msg = document.getElementById("msg").value;
  if(!msg) return;

  add("user", msg);

  let res = await fetch("/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({message: msg})
  });

  let data = await res.json();

  add("bot", data.reply);

  document.getElementById("msg").value="";
}

/* BOAS-VINDAS */
async function start(){
  let res = await fetch("/welcome");
  let data = await res.json();

  let partes = data.message.split("\n\n");

  partes.forEach(p => add("bot", p));
}

start();

</script>

</body>
</html>
