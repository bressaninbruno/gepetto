<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gepetto</title>

<style>
:root{
  --bg:#f4f4f5;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
  --user:#dbeafe;
  --bot:#e5e5e5;
}

*{ box-sizing:border-box; }

html, body{
  margin:0;
  padding:0;
  height:100%;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background:var(--bg);
}

body{
  display:flex;
  justify-content:center;
}

.app{
  width:100%;
  max-width:600px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* TOPO */
.header{
  padding:16px;
  background:#fff;
  border-bottom:1px solid var(--border);
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.brand-avatar{
  width:44px;
  height:44px;
  border-radius:12px;
  overflow:hidden;
}

.brand-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.brand h1{
  margin:0;
  font-size:20px;
}

.brand p{
  margin:0;
  font-size:13px;
  color:var(--muted);
}

/* BOTÕES */
.quick{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:12px;
}

.quick button{
  height:44px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#fff;
  font-weight:600;
  cursor:pointer;
}

/* CHAT */
#chat{
  flex:1;
  overflow-y:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.row{
  display:flex;
}

.row.bot{
  gap:8px;
}

.row.user{
  justify-content:flex-end;
}

/* AVATAR */
.avatar{
  width:34px;
  height:34px;
  border-radius:50%;
  overflow:hidden;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* MENSAGENS */
.msg{
  max-width:75%;
  padding:12px;
  border-radius:14px;
  font-size:14px;
}

.msg.bot{
  background:var(--bot);
}

.msg.user{
  background:var(--user);
}

/* INPUT */
#inputArea{
  display:flex;
  border-top:1px solid var(--border);
  background:#fff;
}

#msg{
  flex:1;
  padding:14px;
  border:none;
  outline:none;
}

button.send{
  padding:14px;
  border:none;
  background:#111;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <div class="brand">
      <div class="brand-avatar">
        <img src="gepetto.png?v=1">
      </div>
      <div>
        <h1>Gepetto</h1>
        <p>Seu concierge • Apto 14B</p>
      </div>
    </div>

    <div class="quick">
      <button onclick="quick('wifi')">📶 Wi-Fi</button>
      <button onclick="quick('praia')">🏖️ Praia</button>
      <button onclick="quick('restaurante')">🍽️ Restaurantes</button>
      <button onclick="quick('mercado')">🛒 Mercado</button>
    </div>
  </div>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="msg" placeholder="Fale com o Gepetto..." onkeydown="enter(event)">
    <button class="send" onclick="send()">Enviar</button>
  </div>

</div>

<script>
function format(text){
  return text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
}

function add(role, text){
  const chat = document.getElementById("chat");

  let html = "";

  if(role === "bot"){
    html = `
      <div class="row bot">
        <div class="avatar">
          <img src="gepetto.png?v=1">
        </div>
        <div class="msg bot">${format(text)}</div>
      </div>
    `;
  } else {
    html = `
      <div class="row user">
        <div class="msg user">${text}</div>
      </div>
    `;
  }

  chat.insertAdjacentHTML("beforeend", html);
  chat.scrollTop = chat.scrollHeight;
}

function quick(q){
  document.getElementById("msg").value = q;
  send();
}

function enter(e){
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
}

async function send(){
  const input = document.getElementById("msg");
  const msg = input.value.trim();
  if(!msg) return;

  add("user", msg);
  input.value = "";

  const res = await fetch("/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({message: msg})
  });

  const data = await res.json();
  add("bot", data.reply);
}

async function start(){
  const res = await fetch("/welcome");
  const data = await res.json();

  const partes = data.message.split("\\n\\n");

  partes.forEach(p => add("bot", p));
}

start();
</script>

</body>
</html>
